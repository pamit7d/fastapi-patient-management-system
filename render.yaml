services:
  - type: web
    name: patient-db-fastapi
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./entrypoint.sh"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
