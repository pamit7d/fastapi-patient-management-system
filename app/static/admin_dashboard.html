<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CampusX PMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338ca;
            --secondary: #10B981;
            --danger: #EF4444;
            --bg-body: #F3F4F6;
            --bg-sidebar: #1E1E2D;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #818CF8;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: #9CA3AF;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--primary-dark);
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: #F9FAFB;
        }

        .btn-danger {
            background-color: #FEE2E2;
            color: var(--danger);
        }

        .btn-danger:hover {
            background-color: #FECACA;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Premium Gradients */
        .stat-card.blue {
            background: linear-gradient(135deg, #ffffff 0%, #EEF2FF 100%);
            border-left: 4px solid var(--primary);
        }

        .stat-card.green {
            background: linear-gradient(135deg, #ffffff 0%, #ECFDF5 100%);
            border-left: 4px solid var(--secondary);
        }

        .stat-card.purple {
            background: linear-gradient(135deg, #ffffff 0%, #F5F3FF 100%);
            border-left: 4px solid #8B5CF6;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 10px;
            color: var(--text-main);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: flex-end;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            background: #F9FAFB;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        tr:hover td {
            background-color: #F9FAFB;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-right: 5px;
            border: none;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        .edit-btn {
            background: #EEF2FF;
            color: var(--primary);
            font-weight: 500;
        }

        .del-btn {
            background: #FEE2E2;
            color: var(--danger);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-shield-alt"></i> AdminPanel
        </div>
        <div class="nav-item active" onclick="showTab('dashboard')" id="nav-dashboard">
            <i class="fas fa-th-large"></i> Dashboard
        </div>
        <div class="nav-item" onclick="showTab('doctors')" id="nav-doctors">
            <i class="fas fa-user-md"></i> Doctors
        </div>
        <div class="nav-item" onclick="showTab('patients')" id="nav-patients">
            <i class="fas fa-users"></i> Patients
        </div>
        <div style="margin-top: auto;">
            <div class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </div>
    </div>

    <div class="main-content">
        <script src="/static/notifications.js"></script>

        <!-- Dashboard Home -->
        <div id="section-dashboard">
            <h1 style="margin-bottom:30px;">Overview</h1>

            <!-- Quick Search -->
            <div class="card" style="border-left: 4px solid #6366F1;">
                <h3><i class="fas fa-search" style="color:#6366F1; margin-right:8px;"></i> Quick Search</h3>
                <div class="search-grid">
                    <div class="form-group">
                        <label>Find Doctor</label>
                        <input type="text" id="doc-search" placeholder="Name or Specialization..."
                            oninput="debounceFetch('doc')">
                    </div>
                    <div class="form-group">
                        <label>Find Patient</label>
                        <input type="text" id="pat-search" placeholder="Name or Phone..."
                            oninput="debounceFetch('pat')">
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card blue">
                    <div class="stat-label">Doctors</div>
                    <div class="stat-value" id="count-docs">0</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-label">Patients</div>
                    <div class="stat-value" id="count-patients">0</div>
                </div>
                <div class="stat-card purple">
                    <div class="stat-label">Appointments</div>
                    <div class="stat-value" id="count-appts">0</div>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="card">
                    <h3><i class="fas fa-user-md"></i> Recent Doctors</h3>
                    <table id="dash-doc-table">
                        <tbody></tbody>
                    </table>
                </div>
                <div class="card">
                    <h3><i class="fas fa-users"></i> Recent Patients</h3>
                    <table id="dash-pat-table">
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Manage Doctors -->
        <div id="section-doctors" class="hidden">
            <div class="header">
                <h1>Manage Doctors</h1>
                <button class="btn" onclick="openModal('modal-add-doc')"><i class="fas fa-plus"></i> Add Doctor</button>
            </div>
            <div class="card">
                <table id="doctors-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Specialization</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Manage Patients -->
        <div id="section-patients" class="hidden">
            <div class="header">
                <h1>Manage Patients</h1>
            </div>
            <div class="card">
                <table id="patients-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Doctor Modal -->
    <div class="modal-overlay" id="modal-add-doc">
        <div class="modal">
            <h3>Add New Doctor</h3>
            <div class="form-group"><label>Username</label><input type="text" id="doc-username"></div>
            <div class="form-group"><label>Password</label><input type="password" id="doc-password"></div>
            <div class="form-group"><label>Full Name</label><input type="text" id="doc-name"></div>
            <div class="form-group"><label>Specialization</label><input type="text" id="doc-spec"></div>
            <div style="margin-top:20px; text-align:right;">
                <button class="btn btn-outline" onclick="closeAllModals()">Cancel</button>
                <button class="btn" onclick="addDoctor()">Create Doctor</button>
            </div>
        </div>
    </div>

    <!-- Edit Doctor Modal -->
    <div class="modal-overlay" id="modal-edit-doc">
        <div class="modal">
            <h3>Edit Doctor</h3>
            <input type="hidden" id="ed-id">
            <div class="form-group"><label>Full Name</label><input type="text" id="ed-name"></div>
            <div class="form-group"><label>Specialization</label><input type="text" id="ed-spec"></div>
            <div style="margin-top:20px; text-align:right;">
                <button class="btn btn-outline" onclick="closeAllModals()">Cancel</button>
                <button class="btn" onclick="saveDoctor()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Edit Patient Modal -->
    <div class="modal-overlay" id="modal-edit-pat">
        <div class="modal">
            <h3>Edit Patient</h3>
            <input type="hidden" id="ep-id">
            <div class="form-group"><label>Full Name</label><input type="text" id="ep-name"></div>
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1"><label>Age</label><input type="number" id="ep-age"></div>
                <div class="form-group" style="flex:1"><label>Gender</label>
                    <select id="ep-gender">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Phone</label><input type="text" id="ep-phone"></div>
            <div class="form-group"><label>City</label><input type="text" id="ep-city"></div>
            <div style="margin-top:20px; text-align:right;">
                <button class="btn btn-outline" onclick="closeAllModals()">Cancel</button>
                <button class="btn" onclick="savePatient()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        async function init() {
            try {
                // Sequential load to prevent race conditions and ensure stability
                await fetchStats();
                await fetchDoctors();
                await fetchPatients();
            } catch (e) {
                console.error("Init failed:", e);
            }
        }

        // Navigation
        function showTab(id) {
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');

            document.getElementById('section-dashboard').classList.add('hidden');
            document.getElementById('section-doctors').classList.add('hidden');
            document.getElementById('section-patients').classList.add('hidden');

            document.getElementById('section-' + id).classList.remove('hidden');
        }

        async function fetchStats() {
            const res = await fetch('/admin/stats', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401 || res.status === 403) {
                showToast('Session Expired or Unauthorized', 'error');
                setTimeout(() => { logout(); }, 1500); // Redirect to login
                return;
            }
            if (!res.ok) return showToast('Error loading stats', 'error');

            const data = await res.json();
            document.getElementById('count-docs').innerText = data.doctors;
            document.getElementById('count-patients').innerText = data.patients;
            document.getElementById('count-appts').innerText = data.appointments;
        }

        let debounceTimers = {};
        function debounceFetch(type) {
            clearTimeout(debounceTimers[type]);
            debounceTimers[type] = setTimeout(() => {
                if (type === 'doc') fetchDoctors();
                if (type === 'pat') fetchPatients();
            }, 300);
        }

        async function fetchDoctors() {
            const query = document.getElementById('doc-search').value;
            let url = '/admin/doctors';
            if (query) url += `?search=${encodeURIComponent(query)}`;

            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();

            // Populate Main Table
            const tbody = document.querySelector('#doctors-table tbody');
            tbody.innerHTML = '';

            // Populate Dash Mini Table
            const dashTbody = document.querySelector('#dash-doc-table tbody');
            dashTbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No doctors</td></tr>';
            }

            data.forEach((doc, idx) => {
                const row = `
                    <tr>
                        <td><strong>${doc.full_name}</strong></td>
                        <td>${doc.specialization}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="editDoctor(${doc.id}, '${doc.full_name}', '${doc.specialization}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="action-btn del-btn" onclick="deleteUser(${doc.user_id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;

                if (idx < 5) {
                    dashTbody.innerHTML += `<tr><td><strong>${doc.full_name}</strong></td><td>${doc.specialization}</td></tr>`;
                }
            });
        }

        async function fetchPatients() {
            const query = document.getElementById('pat-search').value;
            let url = '/patients/';
            if (query) url += `?search=${encodeURIComponent(query)}`;

            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();

            const tbody = document.querySelector('#patients-table tbody');
            tbody.innerHTML = '';

            const dashTbody = document.querySelector('#dash-pat-table tbody');
            dashTbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No patients</td></tr>';
            }

            data.forEach((p, idx) => {
                const row = `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td>${p.age}</td>
                        <td>${p.phone || '-'}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="editPatient(${p.patient_id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="action-btn del-btn" onclick="deleteUser(${p.user_id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;

                if (idx < 5) {
                    dashTbody.innerHTML += `<tr><td><strong>${p.name}</strong></td><td>${p.phone || '-'}</td></tr>`;
                }
            });
        }

        // --- ACTIONS ---
        async function addDoctor() {
            const username = document.getElementById('doc-username').value;
            const password = document.getElementById('doc-password').value;
            const full_name = document.getElementById('doc-name').value;
            const specialization = document.getElementById('doc-spec').value;
            const res = await fetch('/admin/doctors?full_name=' + encodeURIComponent(full_name) + '&specialization=' + encodeURIComponent(specialization), {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) { showToast('Doctor created!', 'success'); closeAllModals(); init(); }
            else showToast('Failed', 'error');
        }

        function editDoctor(id, name, spec) {
            document.getElementById('ed-id').value = id;
            document.getElementById('ed-name').value = name;
            document.getElementById('ed-spec').value = spec;
            openModal('modal-edit-doc');
        }

        async function saveDoctor() {
            const id = document.getElementById('ed-id').value;
            const body = { full_name: document.getElementById('ed-name').value, specialization: document.getElementById('ed-spec').value };
            const res = await fetch(`/admin/doctors/${id}`, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) { showToast('Updated', 'success'); closeAllModals(); fetchDoctors(); }
            else showToast('Error', 'error');
        }

        async function editPatient(pid) {
            const res = await fetch(`/patients/${pid}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) return showToast('Error', 'error');
            const p = await res.json();
            document.getElementById('ep-id').value = p.patient_id;
            document.getElementById('ep-name').value = p.name;
            document.getElementById('ep-age').value = p.age;
            document.getElementById('ep-gender').value = p.gender;
            document.getElementById('ep-phone').value = p.phone;
            document.getElementById('ep-city').value = p.city;
            openModal('modal-edit-pat');
        }

        async function savePatient() {
            const pid = document.getElementById('ep-id').value;
            const body = {
                name: document.getElementById('ep-name').value,
                age: parseInt(document.getElementById('ep-age').value),
                gender: document.getElementById('ep-gender').value,
                phone: document.getElementById('ep-phone').value,
                city: document.getElementById('ep-city').value
            };
            const res = await fetch(`/patients/${pid}`, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) { showToast('Success', 'success'); closeAllModals(); fetchPatients(); }
            else showToast('Error', 'error');
        }

        async function deleteUser(userId) {
            if (!confirm("Are you sure?")) return;
            const res = await fetch(`/admin/users/${userId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { showToast("Deleted", 'success'); init(); } else showToast("Error", 'error');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }

        init();
    </script>
</body>

</html>
